server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 100M;

    # Enforce HTTPS/TLS redirect for sensitive provisioning endpoints containing passwords
    location /api/v1/servers/provision/custom-iso {
        return 301 https://$host$request_uri;
    }
    location /api/v1/provision {
        return 301 https://$host$request_uri;
    }

    # Plain HTTP fallback for non-sensitive boot assets & phone-home (required for busybox/iPXE)
    location / {
        proxy_pass http://ipxe-builder:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    client_max_body_size 100M;

    # SSL certificates (mounted via Docker volumes)
    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://ipxe-builder:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
