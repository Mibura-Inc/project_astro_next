services:
  ipxe-builder:
    image: ipxe-builder:local
    build:
      context: ./Docker
    volumes:
      - .:/work
    environment:
      - SERVER_IP=${SERVER_IP}
    # stdin_open: true # Equivalent to -i
    # tty: true        # Equivalent to -t
    # entrypoint: /bin/bash
    command: python3 configServer/server.py

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      - SERVER_IP=${SERVER_IP}
    volumes:
      - ./configServer/nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - ./configServer/certs:/etc/nginx/certs
      - ./configServer/http/jobs:/var/www/http/automation:ro
      - ./configServer/http/customOS:/var/www/http/customOS:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ ! -f /etc/nginx/certs/server.key ] || [ ! -f /etc/nginx/certs/server.crt ]; then
          echo "SSL certificates not found. Generating self-signed keys..."
          apk add --no-cache openssl
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -keyout /etc/nginx/certs/server.key \
            -out /etc/nginx/certs/server.crt \
            -subj "/CN=$${SERVER_IP:-localhost}"
        fi
        exec nginx -g "daemon off;"
    depends_on:
      - ipxe-builder